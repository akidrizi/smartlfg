# pkgmeta.yaml for SmartLFG addon
package-as: SmartLFG
manual-changelog: CHANGELOG.md
curse-description: README.md

# Files or folders to ignore in packaging.
# ⚠ Keep this list in sync with the EXCLUDES array in package.sh —
# pkgmeta.yaml is used by the CurseForge/BigWigs packager tool and
# cannot share the same config file.
ignore:
  - .git/
  - .github/
  - .idea/
  - docs/
  - dist/
  - .editorconfig
  - .gitignore
  - .luacheckrc
  - package.sh
  - "*.zip"
  - "*.tar.gz"
